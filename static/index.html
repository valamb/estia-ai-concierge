<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESTIA — AI Hotel Concierge</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ─── Sidebar ──────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar__brand">
      <div class="sidebar__logo">E</div>
      <div>
        <div class="sidebar__name">ESTIA</div>
        <div class="sidebar__tagline">AI Concierge</div>
      </div>
    </div>

    <nav class="sidebar__nav">
      <button class="nav-btn active" data-mode="text" title="Text Chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0
               .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0
               0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972
               0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93
               16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/>
        </svg>
        <span>Chat</span>
      </button>

      <button class="nav-btn" data-mode="voice" title="Voice Chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75
               0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
        </svg>
        <span>Voice</span>
      </button>

      <button class="nav-btn" data-mode="image" title="Image Chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25
               2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5
               0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375
               0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>
        </svg>
        <span>Image</span>
      </button>
    </nav>

    <div class="sidebar__properties">
      <div class="sidebar__section-label">Property</div>
      <select id="propertySelect" class="property-select">
        <option value="">All Properties</option>
        <option value="porto_elounda">Porto Elounda</option>
        <option value="elounda_mare">Elounda Mare</option>
        <option value="elounda_peninsula">Elounda Peninsula</option>
      </select>
    </div>

    <div class="sidebar__lang">
      <div class="sidebar__section-label">Language</div>
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="el">ΕΛ</button>
      </div>
    </div>

    <button class="new-chat-btn" id="newChatBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
      </svg>
      New Conversation
    </button>
  </aside>

  <!-- ─── Main ─────────────────────────────────────────────── -->
  <main class="main">

    <!-- Header -->
    <header class="chat-header">
      <div class="chat-header__info">
        <div class="status-dot"></div>
        <span id="headerTitle">Text Concierge</span>
      </div>
      <div class="chat-header__meta" id="headerMeta">GPT-4o · RAG enabled</div>
    </header>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="welcome">
        <div class="welcome__icon">🏨</div>
        <h1 class="welcome__title">Welcome to ESTIA</h1>
        <p class="welcome__subtitle">
          Your personal AI concierge for the Elounda Collection.<br/>
          Ask me anything about our hotels, restaurants, spa, or activities.
        </p>
        <div class="welcome__chips">
          <button class="chip" data-prompt="What restaurants do you have?">Restaurants</button>
          <button class="chip" data-prompt="What time does the spa open?">Spa hours</button>
          <button class="chip" data-prompt="Can I arrange a yacht charter?">Yacht charter</button>
          <button class="chip" data-prompt="Tell me about the kids club">Kids club</button>
          <button class="chip" data-prompt="How do I get from Heraklion airport?">Airport transfer</button>
          <button class="chip" data-prompt="Τι δραστηριότητες έχετε;">Δραστηριότητες</button>
        </div>
      </div>
    </div>

    <!-- ─── Text Input Panel ───────────────────────────────── -->
    <div class="input-panel" id="textPanel">
      <div class="input-bar">
        <textarea
          id="textInput"
          class="input-bar__textarea"
          placeholder="Ask your concierge anything…"
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn" title="Send">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
            <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010
              1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0
              0030.591-12.246.75.75 0 000-.75A60.52 60.52 0 003.478 2.405z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ─── Voice Input Panel ──────────────────────────────── -->
    <div class="input-panel hidden" id="voicePanel">
      <div class="voice-ui">
        <button class="mic-btn" id="micBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="28" height="28">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75
                 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
          </svg>
        </button>
        <div class="voice-label" id="voiceLabel">Hold to record</div>
        <div class="voice-wave hidden" id="voiceWave">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
      <label class="file-upload-btn" title="Upload audio file">
        <input type="file" id="audioFileInput" accept="audio/*" hidden />
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M18.375 12.739l-7.693 7.693a4.5 4.5 0 01-6.364-6.364l10.94-10.94A3
               3 0 1119.5 7.372L8.552 18.32m.009-.01l-.01.01m5.699-9.941l-7.81
               7.81a1.5 1.5 0 002.112 2.13"/>
        </svg>
        Upload audio
      </label>
    </div>

    <!-- ─── Image Input Panel ──────────────────────────────── -->
    <div class="input-panel hidden" id="imagePanel">
      <div class="image-ui">
        <label class="image-drop-zone" id="imageDropZone" for="imageFileInput">
          <input type="file" id="imageFileInput" accept="image/jpeg,image/png,image/gif,image/webp" hidden />
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="40" height="40">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25
                 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5
                 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375
                 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>
          </svg>
          <span id="imageDropLabel">Drop an image or click to upload</span>
          <img id="imagePreview" class="hidden" alt="Preview" />
        </label>
        <div class="image-question-bar">
          <input
            type="text"
            id="imageQuestion"
            class="image-question-input"
            placeholder="What would you like to know about this image?"
          />
          <button class="send-btn" id="imageSendBtn" title="Send">
            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
              <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010
                1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0
                0030.591-12.246.75.75 0 000-.75A60.52 60.52 0 003.478 2.405z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

  </main>

  <script src="/static/js/chat.js"></script>
</body>
</html>
